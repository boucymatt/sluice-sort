name: Sluice CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: sluice-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++ make
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y clang make
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi

      - name: Show toolchain
        run: |
          "$CXX" --version
          make --version

      - name: Build
        run: make clean all TARGET=linux CXX="$CXX"

      - name: Run self-test
        run: make test TARGET=linux CXX="$CXX"

      - name: Strict warning check
        run: make strict TARGET=linux CXX="$CXX"

      - name: Upload Linux artifacts
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: sluice-linux
          path: build/linux/
          if-no-files-found: error

  sanitizers:
    name: Linux sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: Run ASan and UBSan tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: make sanitize TARGET=linux CXX=g++

  macos:
    name: macOS (Apple Clang)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          clang++ --version
          make --version

      - name: Build
        run: make clean all TARGET=macos CXX=clang++

      - name: Run self-test
        run: make test TARGET=macos CXX=clang++

      - name: Strict warning check
        run: make strict TARGET=macos CXX=clang++

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sluice-macos
          path: build/macos/
          if-no-files-found: error

  windows:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MSYS2 and MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Show toolchain
        run: |
          g++ --version
          make --version

      - name: Build
        run: make clean all TARGET=windows CXX=g++

      - name: Run self-test
        run: ./build/windows/sluice.exe --test

      - name: Strict warning check
        run: make strict TARGET=windows CXX=g++

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sluice-windows
          path: build/windows/
          if-no-files-found: error
